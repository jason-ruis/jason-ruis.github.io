<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Ruis - Chaplain, Pastor, Teacher</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg: #050505;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #6366f1; /* The indigo from your original code, used subtly */
            --border: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* Subtle background noise for texture */
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 60%);
        }

        .container {
            width: 100%;
            max-width: 500px; /* Narrow width creates a focused, mobile-app feel */
            position: relative;
            z-index: 1;
        }

        /* Glowing accent behind the content */
        .glow {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeDown 1s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom right, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .roles-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            flex-wrap: wrap;
        }

        .roles-bar span {
            position: relative;
        }
        
        /* Little dots between roles */
        .roles-bar span:not(:last-child)::after {
            content: '•';
            margin-left: 12px;
            color: #333;
        }

        .bio {
            text-align: center;
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 40px;
            font-weight: 300;
            padding: 0 20px;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeUp 1s ease-out 0.2s backwards;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 18px 24px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Subtle shine effect on hover */
        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .link-item:hover {
            border-color: #444;
            transform: scale(1.02);
            background: #161616;
        }

        .link-item:hover::before {
            transform: translateX(100%);
        }

        .link-text {
            font-weight: 500;
            font-size: 1rem;
        }

        .link-sub {
            font-size: 0.8rem;
            color: #666;
            margin-left: 10px;
        }

        .arrow {
            color: #444;
            transition: 0.3s;
        }

        .link-item:hover .arrow {
            color: var(--text-main);
            transform: translateX(3px);
        }

        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.8rem;
            color: #444;
            padding-top: 20px;
            border-top: 1px solid #111;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <header>
            <h1>Jason Ruis</h1>
            <div class="roles-bar">
                <span>Chaplain</span>
                <span>Pastor</span>
                <span>Teacher</span>
            </div>
        </header>

        <div class="bio">
            <p>Equipping saints to understand God's Word and apply it to daily life. Developing leaders and pursuing reformation.</p>
        </div>

        <div class="links-group">
            <a href="https://themessyreformation.com" class="link-item" target="_blank">
                <span class="link-text">The Messy Reformation <span class="link-sub">Podcast</span></span>
                <span class="arrow">→</span>
            </a>

            <a href="https://jasonruis.com" class="link-item" target="_blank">
                <span class="link-text">Jason Ruis <span class="link-sub">Substack</span></span>
                <span class="arrow">→</span>
            </a>

            <a href="https://www.linkedin.com/in/jason-ruis-735917257/" class="link-item" target="_blank">
                <span class="link-text">LinkedIn <span class="link-sub">Connect</span></span>
                <span class="arrow">→</span>
            </a>
        </div>

        <footer>
            <p>"Equipping saints to know Christ and glorify God"</p>
        </footer>
    </div>

</body>
</html>
