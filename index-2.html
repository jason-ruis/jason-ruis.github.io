<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Ruis - Chaplain, Pastor, Teacher</title>
    <style>
        /* Import fonts: Playfair Display (Serif) for class/headings, Inter (Sans) for readability */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

        :root {
            --bg-color: #FAFAF9; /* Warm off-white, like paper */
            --text-main: #1C1917; /* Soft charcoal, not pure black */
            --text-muted: #57534E;
            --accent: #44403C;
            --border: #E7E5E4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text-main);
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* Center vertically on large screens */
            padding: 40px 20px;
        }

        /* Main Container - Limits width for readability */
        .container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeIn 1.2s ease-out forwards;
        }

        /* Header Section */
        header {
            text-align: center;
            margin-bottom: 60px;
            padding-top: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            color: var(--text-main);
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 30px;
            display: block;
        }

        /* Divider */
        .separator {
            width: 40px;
            height: 1px;
            background: var(--text-muted);
            margin: 0 auto 30px auto;
            opacity: 0.3;
        }

        /* Bio Section */
        .bio {
            text-align: center;
            margin-bottom: 50px;
        }

        .bio p {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 300;
            max-width: 90%;
            margin: 0 auto;
        }

        .bio em {
            font-family: 'Playfair Display', serif;
            color: var(--text-main);
            font-style: italic;
        }

        /* Links Section */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 30px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px; /* Soft formatting */
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card span {
            font-weight: 500;
            font-size: 1.05rem;
            z-index: 2;
        }

        /* Arrow Icon */
        .link-card::after {
            content: '→';
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        /* Hover Effects */
        .link-card:hover {
            transform: translateY(-2px);
            border-color: var(--text-muted);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        .link-card:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        /* Footer */
        footer {
            margin-top: 80px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            opacity: 0.7;
        }

        footer p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        /* Subtle Animation on Load */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            .tagline { font-size: 0.7rem; letter-spacing: 2px; }
            .link-card { padding: 18px 24px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Jason Ruis</h1>
            <span class="tagline">Chaplain &middot; Pastor &middot; Teacher</span>
            <div class="separator"></div>
        </header>

        <div class="bio">
            <p>
                Equipping saints to understand God's Word and apply it to daily life. 
                Developing leaders and pursuing <em>Reformation</em>.
            </p>
        </div>

        <div class="links-stack">
            <a href="https://themessyreformation.com" class="link-card" target="_blank">
                <span>The Messy Reformation Podcast</span>
            </a>
            
            <a href="https://jasonruis.com" class="link-card" target="_blank">
                <span>Substack Writing</span>
            </a>

            <a href="https://www.linkedin.com/in/jason-ruis-735917257/" class="link-card" target="_blank">
                <span>LinkedIn Profile</span>
            </a>
        </div>

        <footer>
            <p>"Equipping saints to know Christ and glorify God"</p>
        </footer>
    </div>

</body>
</html>
