<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finals Jeopardy - Old Testament Review</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 3em;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 30px;
        }

        .category {
            background: #1e3c72;
            color: white;
            padding: 12px 5px;
            text-align: center;
            font-weight: bold;
            font-size: 0.75em;
            border: 3px solid #ffd700;
            border-radius: 5px;
            text-transform: uppercase;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-tile {
            background: #1e3c72;
            color: #ffd700;
            padding: 20px 8px;
            text-align: center;
            font-size: 1.4em;
            font-weight: bold;
            border: 3px solid #ffd700;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .question-tile:hover:not(.used) {
            background: #2a5298;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .question-tile.used {
            background: #0d1b2a;
            color: #555;
            cursor: not-allowed;
            border-color: #555;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow-y: auto;
        }

        .modal-content {
            background-color: #1e3c72;
            margin: 3% auto;
            padding: 40px;
            border: 5px solid #ffd700;
            border-radius: 10px;
            width: 85%;
            max-width: 900px;
            color: white;
            position: relative;
        }

        .close {
            color: #ffd700;
            float: right;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            line-height: 30px;
        }

        .close:hover {
            color: white;
        }

        .question-text {
            font-size: 1.6em;
            margin: 30px 0;
            text-align: center;
            line-height: 1.5;
        }

        .value {
            color: #ffd700;
            font-size: 2em;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .answer {
            display: none;
            background: #0d1b2a;
            padding: 25px;
            margin-top: 30px;
            border-radius: 5px;
            font-size: 1.2em;
            border: 2px solid #ffd700;
            line-height: 1.6;
        }

        .show-answer-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            font-size: 1.3em;
            background: #ffd700;
            color: #1e3c72;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .show-answer-btn:hover {
            background: white;
            transform: scale(1.05);
        }

        .reset-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            font-size: 1.2em;
            background: #28a745;
            color: white;
            border: 3px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: #218838;
            transform: scale(1.05);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .score-card {
            background: white;
            padding: 25px 40px;
            border-radius: 10px;
            border: 4px solid #ffd700;
            text-align: center;
            min-width: 200px;
        }

        .score-label {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .boys-label {
            color: #0066cc;
        }

        .girls-label {
            color: #cc0066;
        }

        .score-value {
            font-size: 3em;
            font-weight: bold;
            color: #1e3c72;
        }

        .team-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .team-btn {
            padding: 15px 40px;
            font-size: 1.3em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            color: white;
        }

        .boys-btn {
            background: #0066cc;
        }

        .boys-btn:hover {
            background: #0052a3;
            transform: scale(1.05);
        }

        .girls-btn {
            background: #cc0066;
        }

        .girls-btn:hover {
            background: #a30052;
            transform: scale(1.05);
        }

        .no-point-btn {
            background: #6c757d;
            padding: 15px 30px;
            font-size: 1.1em;
        }

        .no-point-btn:hover {
            background: #5a6268;
            transform: scale(1.05);
        }

        @media (max-width: 1200px) {
            .board {
                grid-template-columns: repeat(4, 1fr);
            }
            .question-tile {
                font-size: 1.2em;
                padding: 15px 5px;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .board {
                grid-template-columns: repeat(2, 1fr);
                gap: 4px;
            }

            .category {
                font-size: 0.6em;
                padding: 8px 3px;
                min-height: 50px;
            }

            .question-tile {
                font-size: 1em;
                padding: 12px 4px;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }

            .question-text {
                font-size: 1.1em;
            }

            .answer {
                font-size: 1em;
            }

            .team-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FINALS JEOPARDY</h1>

        <div class="scoreboard">
            <div class="score-card">
                <div class="score-label boys-label">Boys</div>
                <div class="score-value" id="boysScore">0</div>
            </div>
            <div class="score-card">
                <div class="score-label girls-label">Girls</div>
                <div class="score-value" id="girlsScore">0</div>
            </div>
        </div>

        <div class="board" id="board"></div>

        <button class="reset-btn" id="resetBtn">Reset Game</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeBtn">&times;</span>
            <div class="value" id="pointValue"></div>
            <div class="question-text" id="questionText"></div>
            <button class="show-answer-btn" id="showAnswerBtn">Show Answer</button>
            <div class="answer" id="answerText"></div>
            <div class="team-buttons" id="teamButtons" style="display: none;">
                <button class="team-btn boys-btn" id="boysBtn">Boys Got It Right</button>
                <button class="team-btn girls-btn" id="girlsBtn">Girls Got It Right</button>
                <button class="team-btn no-point-btn" id="noPointBtn">No Points</button>
            </div>
        </div>
    </div>

    <script>
        const categories = [
            "Genesis",
            "Exodus-Deuteronomy",
            "The Histories",
            "Wisdom Literature",
            "Divided Kingdom",
            "The Prophets",
            "Exile & Return"
        ];

        const questions = {
            "Genesis": {
                100: {
                    q: "What is a covenant?",
                    a: "A covenant is a binding agreement between two parties that establishes a relationship with specific obligations — a promise."
                },
                200: {
                    q: "What is the overall theme of the Old Testament?",
                    a: "God is a promise-maker and promise-keeper who works through history to bring salvation to His people, ultimately pointing to redemption through Jesus Christ — God is faithful. His people are not."
                },
                300: {
                    q: "What special role and responsibility did God give to humans as bearers of the Imago Dei?",
                    a: "Humans were made in God's image (Imago Dei) and given dominion over creation, serving as God's representatives to rule, care for, and steward the earth on His behalf."
                },
                400: {
                    q: "What choice did the tree of the knowledge of good and evil represent for Adam and Eve?",
                    a: "The tree represented the choice between trusting and obeying God or choosing autonomy—deciding for themselves what was good and evil instead of accepting God's definition."
                },
                500: {
                    q: "Describe the Noahic Covenant. Was it conditional or unconditional? What was its sign?",
                    a: "The Noahic Covenant was God's promise never to destroy the earth by flood again; it was unconditional (requiring nothing from Noah or humanity), and its sign was the rainbow."
                },
                600: {
                    q: "List the three main promises God made to Abram in the Abrahamic Covenant.",
                    a: "(1) Land—God would give Abram and his descendants a specific land; (2) Descendants—God would make Abram into a great nation; (3) Blessing—Through Abram, all nations of the earth would be blessed."
                },
                700: {
                    q: "Explain how the covenant ceremony in Genesis 15 showed that the covenant was unconditional.",
                    a: "In the ceremony, God alone passed between the divided animals while Abram slept, indicating that God took sole responsibility for keeping the covenant—if the covenant failed, God Himself would bear the consequences, not Abram."
                },
                800: {
                    q: "Describe the event that transformed Jacob's identity. What was his name changed to, and what does it signify?",
                    a: "Jacob wrestled with a mysterious figure (the Angel of the Lord) at the Jabbok River and was renamed \"Israel,\" meaning \"he struggles with God\" or \"God struggles\"—signifying that Jacob's descendants would carry this identity as God's covenant people."
                },
                900: {
                    q: "Why did Joseph test his brothers? What did he need to see in them?",
                    a: "Joseph tested his brothers to see if they had truly changed—whether they would abandon Benjamin (the new favored son) the way they had abandoned him. He needed to see if they would protect Benjamin at their own expense, demonstrating genuine repentance and change."
                },
                1000: {
                    q: "What is the meaning and importance of Genesis 50:20, and how does it summarize the entire unit's theme?",
                    a: "\"You intended to harm me, but God intended it for good to accomplish what is now being done, the saving of many lives\"—this verse summarizes the theme that God sovereignly works through human sin and suffering to accomplish His redemptive purposes. It ties together Joseph's story by showing that God used the brothers' evil actions to position Joseph in Egypt to save many lives during the famine."
                }
            },
            "Exodus-Deuteronomy": {
                100: {
                    q: "Where was the tabernacle placed in the Israelite camp?",
                    a: "God instructed that the tabernacle be placed at the center of the camp, surrounded by the twelve tribes."
                },
                200: {
                    q: "What was the significance of the tabernacle's location at the center of the camp?",
                    a: "The central location signified that God was to be at the center of their lives, not just their geography."
                },
                300: {
                    q: "Describe the complaint cycle that repeated in Israel's wilderness experience.",
                    a: "The pattern was: Israel faced a problem, they complained against Moses and God (often wanting to return to Egypt), God provided for their needs, and yet they soon forgot His faithfulness and complained again when the next challenge arose."
                },
                400: {
                    q: "What does the name \"I AM WHO I AM\" reveal about God's character and His relationship with His people?",
                    a: "\"I AM WHO I AM\" (YHWH) reveals that God is self-existent, eternal, unchanging, and faithful—He is not defined by anything outside Himself and will always be who He promises to be in relationship with His people."
                },
                500: {
                    q: "How do the plagues demonstrate God's supremacy over Egyptian gods?",
                    a: "Each plague specifically targeted and defeated an Egyptian deity (e.g., the Nile god, sun god Ra), demonstrating that the God of Israel was the one true God with power over all creation and all false gods."
                },
                600: {
                    q: "What does it mean that God's law required obedience in \"both thought and deed\"?",
                    a: "Unlike other ancient law codes that only governed actions, the Ten Commandments addressed internal attitudes (like coveting) as well as external behavior, showing that God cares about the heart, not just outward compliance."
                },
                700: {
                    q: "What does it mean for God's people to be holy? Why is holiness the central theme of Leviticus?",
                    a: "\"Holy\" means \"set apart\" for God's special purposes—His people must live differently from other nations in their worship and daily conduct. Holiness is central because God commanded, \"Be holy because I am holy,\" establishing that His people's identity is defined by their relationship with and imitation of their holy God."
                },
                800: {
                    q: "Compare the reports of the 10 spies versus Caleb and Joshua. What did they see differently?",
                    a: "All 12 spies confirmed the land was bountiful, but the 10 focused on the giants and fortified cities (obstacles), while Caleb and Joshua focused on God's power and promises, trusting He could give them the land."
                },
                900: {
                    q: "What was God's judgment for Israel's unbelief at the border of the Promised Land?",
                    a: "God condemned the adult generation (except Caleb and Joshua) to wander in the wilderness for 40 years until they died—only those under 20 would enter the Promised Land."
                },
                1000: {
                    q: "Why did the new generation need to renew their covenant with God before entering the Promised Land?",
                    a: "This generation hadn't personally experienced Mount Sinai or the exodus—they needed to make their own covenant commitment to God."
                }
            },
            "The Histories": {
                100: {
                    q: "Why did Israel want a king like the surrounding nations?",
                    a: "They wanted to be like the surrounding nations. When they felt leaderless, they turned to Canaanite gods."
                },
                200: {
                    q: "What three offices did Samuel serve in Israel? Describe each role.",
                    a: "(1) Prophet—he received and proclaimed God's word to Israel; (2) Priest—he offered sacrifices and interceded for the people; (3) Judge—he settled disputes and led Israel against enemies."
                },
                300: {
                    q: "What condition did Joshua give for the land to be a place of rest?",
                    a: "The land would be a place of rest for Israel only if they kept God's commands, remained loyal to Him alone, and did not intermarry with or worship the gods of the surrounding nations."
                },
                400: {
                    q: "How was God's presence evident in Israel's victories and defeats?",
                    a: "Israel's victories and defeats depended entirely on God's presence with them—victory came when God was with them (Jericho), and defeat came when sin caused Him to withdraw His presence (Ai)."
                },
                500: {
                    q: "Describe the five-part cycle of life during the judges. What does each part mean?",
                    a: "(1) Relapse—Israel turned away from God into sin/idolatry; (2) Retribution—God allowed enemies to oppress them; (3) Repentance—in misery, they cried out to God; (4) Rescue—God raised up a judge to deliver them; (5) Rest—peace followed until the cycle began again."
                },
                600: {
                    q: "What kind of heroes did God raise up during the judges period? Why is this significant?",
                    a: "God raised up flawed heroes (like Gideon who was hesitant and Samson who was morally compromised) to show that deliverance came from God's power, not human perfection—pointing to humanity's need for a perfect Savior."
                },
                700: {
                    q: "How does Ruth's story contrast with life in Israel during the time of the judges? How did God work through Ruth?",
                    a: "While Israel \"did what was right in their own eyes\" and abandoned God, Ruth (a foreigner) chose to follow God faithfully. God blessed Ruth's faithfulness by giving her a son named Obed, who became the grandfather of King David, placing Ruth in the direct lineage of Jesus Christ."
                },
                800: {
                    q: "Why did God eventually reject Saul as king? What was his key sin?",
                    a: "Saul disobeyed God by offering a sacrifice himself (usurping the priest's role) rather than waiting for Samuel as commanded; his core sin was trusting his own judgment over God's command and fearing people more than God."
                },
                900: {
                    q: "How did David and Saul respond differently to God throughout 1 Samuel?",
                    a: "Saul heard God's commands but made excuses and failed to truly obey, while David listened and obeyed with genuine repentance when he sinned; Saul trusted himself while David trusted God's timing and power."
                },
                1000: {
                    q: "What covenant did God establish with David? What was promised about his kingdom?",
                    a: "God promised David that his house, kingdom, and throne would endure forever (2 Samuel 7:16)—a promise impossible for any human dynasty but ultimately fulfilled in Jesus Christ, whose kingdom has no end."
                }
            },
            "Wisdom Literature": {
                100: {
                    q: "Who wrote most of the proverbs?",
                    a: "King Solomon wrote most of the proverbs (he composed 3,000 proverbs according to 1 Kings 4:32)."
                },
                200: {
                    q: "What does Proverbs 1:7 say is \"the beginning of knowledge\"?",
                    a: "\"The fear of the LORD is the beginning of knowledge, but fools despise wisdom and instruction\"—meaning true wisdom starts with reverence for and submission to God's authority."
                },
                300: {
                    q: "What do the Psalms teach us about prayer?",
                    a: "The Psalms teach that we can bring every emotion to God—praise, lament, thanksgiving, confession—with complete honesty; they model prayer that begins with raw complaint but moves toward trust, showing that genuine relationship with God includes both joy and struggle."
                },
                400: {
                    q: "How does Song of Songs 8:6-7 describe the power and value of love?",
                    a: "Love is described as \"strong as death,\" \"unyielding as the grave,\" burning like a \"blazing fire\"; many waters cannot quench it and rivers cannot sweep it away; nothing on earth is worth as much as true love—all wealth would be scorned if offered for it."
                },
                500: {
                    q: "What experiments did the Teacher try in his search for meaning? What did he conclude?",
                    a: "The Teacher pursued wisdom/knowledge, pleasure/laughter, great building projects, possessions/wealth, and work/toil. He concluded all were \"meaningless\" because death cancels everything out \"under the sun.\""
                },
                600: {
                    q: "How does Ecclesiastes contrast life \"under the sun\" (without God) with life \"above the sun/under heaven\" (with God)?",
                    a: "Life \"under the sun\" (without God) is meaningless—wisdom, pleasure, wealth, and work all end in death and are forgotten; life \"above the sun/under heaven\" (with God) has meaning through relationship with the Creator, enjoying His gifts, and fearing/obeying Him."
                },
                700: {
                    q: "What is humanity's \"whole duty\" according to Ecclesiastes 12:13-14?",
                    a: "\"Fear God and keep his commandments, for this is the whole duty of man. For God will bring every deed into judgment\"—meaning is found not in earthly pursuits but in relationship with God and obedience to Him."
                },
                800: {
                    q: "What was the friends' explanation for Job's suffering? Why was their theology flawed?",
                    a: "The friends believed suffering = punishment for sin (retribution theology), so Job must have sinned. This was flawed because it ignores that innocent people do suffer, assumes blessing is payment for good behavior, and cannot account for spiritual realities like Satan's test."
                },
                900: {
                    q: "Instead of answering Job's \"why\" questions, what did God do in Job 38-39?",
                    a: "God asked Job a series of rhetorical questions about creation (\"Where were you when I laid the earth's foundation?\") to show the vast difference between human understanding and God's infinite wisdom and power."
                },
                1000: {
                    q: "How did Job respond after hearing from God (Job 42:1-6)?",
                    a: "Job realized God is beyond understanding, regretted his bitter words, said \"My ears had heard of you but now my eyes have seen you,\" and repented \"in dust and ashes.\""
                }
            },
            "Divided Kingdom": {
                100: {
                    q: "Which kingdom falls first: Israel (Northern Kingdom) or Judah (Southern Kingdom)? Why?",
                    a: "Israel (the Northern Kingdom) fell first (722 BC to Assyria) because they never had a single king who followed God—from Jeroboam's golden calves onward, they completely abandoned God and became indistinguishable from surrounding nations."
                },
                200: {
                    q: "Why did Jeroboam set up golden calves at Bethel and Dan?",
                    a: "Jeroboam feared that if people traveled to Jerusalem's temple to worship, they would return their allegiance to Rehoboam and kill him—so he created \"convenient worship\" sites to keep political control."
                },
                300: {
                    q: "What were the tragic results of Jeroboam's golden calves?",
                    a: "The people worshiped these idols and soon forgot God entirely—this set in motion events that would never be reversed and eventually led to Israel's destruction."
                },
                400: {
                    q: "Describe the showdown between Elijah and the prophets of Baal on Mount Carmel.",
                    a: "Elijah stood alone against 450 prophets of Baal who worked themselves into a frenzy; Elijah prayed quietly to God, who answered by sending fire from heaven."
                },
                500: {
                    q: "What did the Mount Carmel showdown demonstrate about God's power?",
                    a: "It demonstrated that only the LORD could control fire, rain, and fertility, not Baal—showing God's absolute supremacy over all false gods."
                },
                600: {
                    q: "Why did Elijah flee to Horeb after his victory? How did God minister to him?",
                    a: "After Jezebel's death threat, Elijah was physically exhausted, spiritually depleted, and felt alone. God sent an angel with food and water, then appeared not in wind/earthquake/fire but in a gentle whisper, assuring Elijah that 7,000 had not bowed to Baal."
                },
                700: {
                    q: "How does Chronicles judge each king?",
                    a: "Chronicles evaluates each king by three criteria: (1) whether they maintained temple worship, (2) whether they obeyed God's law, and (3) whether they honored the Davidic succession—their relationship with God, not political achievements, determined their legacy."
                },
                800: {
                    q: "What did Hezekiah foolishly show the Babylonians? What was Isaiah's prophetic response?",
                    a: "Hezekiah foolishly showed them all his wealth, treasures, and armory. Isaiah prophesied that all Judah's wealth would be carried off to Babylon and Hezekiah's descendants would serve as eunuchs in the Babylonian palace."
                },
                900: {
                    q: "What significant event occurred during Josiah's temple repairs? How did Josiah respond?",
                    a: "During temple cleaning/repairs, they discovered the Book of the Law (likely Deuteronomy) that had been lost and forgotten; when read to King Josiah, he tore his robes in grief, realizing Judah's deep covenant unfaithfulness."
                },
                1000: {
                    q: "Why couldn't even Josiah's good reforms prevent Judah's judgment? What does this teach us?",
                    a: "Despite Josiah's extensive reforms, the people's hearts remained unchanged—after his death, kings immediately returned to evil ways. This shows that external reforms cannot produce internal heart transformation; human effort alone cannot achieve lasting righteousness, pointing to our need for Christ's transforming work through the New Covenant."
                }
            },
            "The Prophets": {
                100: {
                    q: "What common themes did the prophets share in their messages to Israel and Judah?",
                    a: "Common themes included: (1) Warning of judgment for breaking the covenant; (2) Call to repent from wickedness to God; and (3) Promise of hope for those who repent."
                },
                200: {
                    q: "Why was the prophetic call important? How did it authenticate the prophet's message?",
                    a: "The call established that prophets were chosen by God, not self-appointed; it validated their message to skeptical audiences. The call gave them authority to confront kings and people, making them accountable to God rather than to human opinion."
                },
                300: {
                    q: "According to Micah 6:8, what three things does God require from his people?",
                    a: "(1) Act justly, (2) Love mercy, (3) Walk humbly with your God."
                },
                400: {
                    q: "What does \"act justly, love mercy, walk humbly with your God\" each mean?",
                    a: "\"Act justly\" means actively pursuing justice and treating others fairly. \"Love mercy\" means showing passionate, committed compassion to those in need, not grudging duty. \"Walk humbly with your God\" means living in ongoing, daily, humble relationship with God—walking daily by faith."
                },
                500: {
                    q: "What were the distinct roles of prophet, priest, and king? What did each one do?",
                    a: "Prophet—spoke God's words to the people and kings as God's messenger; Priest—led worship, offered sacrifices, and served as intercessor between God and people; King—God's anointed earthly ruler who led in battle and represented people to other nations."
                },
                600: {
                    q: "How does Jesus fulfill the roles of prophet, priest, and king more perfectly than those in the Old Testament?",
                    a: "Jesus is the perfect Prophet who not only speaks God's word but IS the Word made flesh. He is the perfect Priest who offered Himself once for all as the final sacrifice and is our only mediator. He is the perfect King who rules with justice and mercy eternally, never abusing His authority."
                },
                700: {
                    q: "What does the shepherd imagery reveal about God's character? How does it connect to Jesus in John 10?",
                    a: "The shepherd imagery reveals God as one who personally cares for, guides, protects, and provides for His people—He tends His flock, gathers lambs, and carries them close to His heart. Jesus declared \"I am the Good Shepherd\" who lays down His life for the sheep (John 10:11), fulfilling and surpassing all Old Testament shepherd imagery."
                },
                800: {
                    q: "What are the three time dimensions prophetic messages often addressed?",
                    a: "(1) Present dimension—addressed the immediate situation in the prophet's time; (2) Near future—events within generations including the Messiah's first coming; (3) Distant future—end times and Christ's second coming."
                },
                900: {
                    q: "List specific details from Isaiah 53 about the coming servant.",
                    a: "Isaiah 53 describes the servant as despised and rejected, a man of suffering, pierced for our transgressions, crushed for our iniquities, by whose wounds we are healed; silent like a lamb to slaughter, assigned a grave with the wicked but buried with the rich."
                },
                1000: {
                    q: "How was Isaiah 53 fulfilled in Jesus?",
                    a: "Every detail was fulfilled in Jesus: rejected by His people, crucified between criminals, silent before Pilate, buried in Joseph of Arimathea's tomb, His death bringing healing and forgiveness."
                }
            },
            "Exile & Return": {
                100: {
                    q: "What Jewish festival does the Book of Esther explain? How did it get its name?",
                    a: "The Book of Esther explains the origin of the festival of Purim. The name comes from \"pur\" (meaning \"lot\") because Haman cast lots to determine the date for the Jews' destruction, but God turned his evil plan against him."

                200: {

                    a: "Cyrus authorized the Jewish exiles to return to Jerusalem and rebuild the temple, and he returned the temple articles that Nebuchadnezzar had taken. Ezra explains: \"The LORD moved the heart of Cyrus king of Persia\"—God sovereignly worked through this pagan king to fulfill His purposes."

                300: {
                    q: "What historical events brought Daniel to Babylon, and when did this happen?",
                    a: "King Nebuchadnezzar of Babylon besieged Jerusalem and took young men from the royal family and nobility to be trained for service in the Babylonian court; Daniel was taken during the first captivity around 606/605 BC during King Jehoiakim's reign."

                400: {
                    q: "What choice did Daniel and his friends face regarding the king's food? Why was it a problem?",
                    a: "The king assigned them daily portions of royal food and wine, which could have violated Jewish dietary laws OR could have been a form of \"bribe\" to buy their allegiance to Babylon. Eating it would defile them and compromise Daniel's commitment to God—he resolved not to defile himself with the king's food."

                500: {
                    q: "How did God bless Daniel and his friends because they remained faithful to him?",

                    a: "Nebuchadnezzar saw an enormous tree reaching to the sky, providing shelter and food for all creatures; a messenger from heaven ordered it cut down, leaving only a stump bound with iron and bronze. The tree represented Nebuchadnezzar himself—his greatness that had grown to reach the sky and his dominion that extended to the ends of the earth."

                    a: "Daniel pleaded: \"Renounce your sins by doing what is right, your wickedness by being kind to the oppressed.\" Twelve months later, while boasting about his achievements, Nebuchadnezzar was driven from people and lived like an animal with hair like eagles' feathers and nails like birds' claws. He later raised his eyes to heaven, acknowledged God's sovereignty, and was restored."

                    a: "MENE—God has numbered your reign and brought it to an end; TEKEL—you have been weighed and found wanting; PERES/PARSIN—your kingdom is divided and given to the Medes and Persians. That very night Belshazzar was killed and Babylon fell—God's judgment was swift and complete."

                    a: "Esther had to decide whether to risk her life by approaching the king without being summoned (punishable by death) to reveal her Jewish identity and plead for her people. She asked all Jews to fast for three days, then said \"I will go to the king, even though it is against the law. And if I perish, I perish.\""

                1000: {
                    q: "What forms of external opposition did Nehemiah face? How long did it take to rebuild the walls?",
                    a: "Nehemiah faced: (1) ridicule and mockery; (2) threats and plots to attack Jerusalem; (3) false accusations of rebellion; (4) attempts to lure him into a trap; and (5) hired prophets trying to discredit him. Despite this, the walls were rebuilt in just 52 days. Even enemies recognized \"this work had been done with the help of our God.\""

        let usedQuestions = new Set();
        let boysScore = 0;
        let girlsScore = 0;
        let currentQuestionValue = 0;

        function updateScoreboard() {
            document.getElementById('boysScore').textContent = boysScore;
            document.getElementById('girlsScore').textContent = girlsScore;
        }

        function addPointsToBoys() {
            boysScore += currentQuestionValue;
            updateScoreboard();
            closeModal();
        }

        function addPointsToGirls() {
            girlsScore += currentQuestionValue;
            updateScoreboard();
            closeModal();
        }

        function noPoints() {
            closeModal();
        }

        function initializeBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            // Add category headers
            categories.forEach(cat => {
                const catDiv = document.createElement('div');
                catDiv.className = 'category';
                catDiv.textContent = cat;
                board.appendChild(catDiv);
            });

            // Add question tiles
            const values = [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000];
            values.forEach(value => {
                categories.forEach(cat => {
                    const tile = document.createElement('div');
                    tile.className = 'question-tile';
                    tile.textContent = '$' + value;
                    tile.dataset.category = cat;
                    tile.dataset.value = value;

                    const questionId = `${cat}-${value}`;
                    if (usedQuestions.has(questionId)) {
                        tile.classList.add('used');
                    } else {
                        tile.onclick = () => openQuestion(cat, value);
                    }

                    board.appendChild(tile);
                });
            });
        }

        function openQuestion(category, value) {
            const questionId = `${category}-${value}`;
            if (usedQuestions.has(questionId)) return;

            const question = questions[category][value];
            currentQuestionValue = value;

            document.getElementById('pointValue').textContent = '$' + value;
            document.getElementById('questionText').textContent = question.q;
            document.getElementById('answerText').textContent = question.a;
            document.getElementById('answerText').style.display = 'none';
            document.getElementById('teamButtons').style.display = 'none';

            document.getElementById('modal').style.display = 'block';

            // Mark as used
            usedQuestions.add(questionId);

            // Update the board
            initializeBoard();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function showAnswer() {
            const answerDiv = document.getElementById('answerText');
            answerDiv.style.display = 'block';

            // Show team buttons after answer is revealed
            document.getElementById('teamButtons').style.display = 'flex';
        }

        function resetGame() {
            if (confirm('Are you sure you want to reset the game? All progress and scores will be lost.')) {
                usedQuestions.clear();
                boysScore = 0;
                girlsScore = 0;
                updateScoreboard();
                initializeBoard();
                closeModal();
            }
        }

        // Wait for DOM to be fully loaded before attaching event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Event Listeners
            document.getElementById('closeBtn').addEventListener('click', closeModal);
            document.getElementById('showAnswerBtn').addEventListener('click', showAnswer);
            document.getElementById('resetBtn').addEventListener('click', resetGame);
            document.getElementById('boysBtn').addEventListener('click', addPointsToBoys);
            document.getElementById('girlsBtn').addEventListener('click', addPointsToGirls);
            document.getElementById('noPointBtn').addEventListener('click', noPoints);

            // Close modal when clicking outside
            window.onclick = function(event) {
                const modal = document.getElementById('modal');
                if (event.target === modal) {
                    closeModal();
                }
            }

            // Initialize the board and scoreboard on load
            initializeBoard();
            updateScoreboard();
        });
    </script>
</body>
